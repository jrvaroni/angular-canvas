@if(isCanvas) {
    <div class="h-full border-r lg:block w-[57px] absolute z-[999] bg-white">
        <h2 class="mb-2 px-4 text-lg font-semibold tracking-tight h-[96px]">
            <img src="./logo-icon.svg" class="h-full w-full" alt="logo">
        </h2>
        @for (item of menu; track item) {
            <side-button [routerLink]="item.link" class="font-medium" [ngClass]="{ 'bg-secondary': !!item.selected }">
                <hlm-icon size="sm" [name]="item.icon" class="mr-2 h-4 w-4" />
            </side-button>
        }
    </div>
} @else {
    <div class="side-menu border-border hidden h-full border-r lg:block">
        <hlm-scroll-area class="h-[calc(100vh-1px)]" visibility="hover">
        <div class="space-y-4 py-4 ">
            <div class="px-3 py-2">
                <h2 class="mb-2 px-4 text-lg font-semibold tracking-tight"><img src="./logo-icon.svg" class="h-full w-[200px] transition-all duration-200 ease-soft-in-out max-h-[80px]" alt="logo" ></h2>
                
                    <div class="space-y-1">
                        @for (item of menu; track item) {
                            <side-button [routerLink]="item.link" class="font-medium" [ngClass]="{ 'bg-secondary': !!item.selected }">
                                <hlm-icon size="sm" [name]="item.icon" class="mr-2 h-4 w-4" />
                                {{ item.text }}
                            </side-button>
                        }
                    </div>
                </div>
            </div>
        </hlm-scroll-area>
    </div>
}
