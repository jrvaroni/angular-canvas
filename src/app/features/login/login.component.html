<div hmlcard class="bg-background overflow-hidden shadow-md md:shadow-xl">
    <div
        class="container relative flex h-[600px] flex-col items-center justify-center md:grid md:h-screen lg:max-w-none lg:grid-cols-2 lg:px-0"
    >
        <a hlmBtn variant="ghost" class="absolute right-4 top-4 md:right-8 md:top-8" href="/examples/authentication">
            Cadastrar
        </a>
        <div class="bg-muted relative hidden h-full flex-col border-r p-10 text-white lg:flex dark:border-r-zinc-800 bg-[url('/bg-login.png')] bg-cover bg-center bg-no-repeat">
            <div class="absolute inset-0 bg-zinc-900"></div>
            <div class="relative z-20 flex items-center text-lg font-medium">
                <img src="/logo-full.svg" alt="logo" class="w-full mt-[100px]">
            </div>
            <div class="relative z-20 mt-auto">
                <blockquote class="space-y-2">
                    <p class="text-lg">
                        “System Management”
                    </p>
                </blockquote>
            </div>
        </div>
        <div class="lg:p-8">
        <div class="mx-auto w-full justify-center space-y-6 sm:w-[350px]">
    <div class="space-y-2 text-center">
        <h1 class="text-2xl font-semibold tracking-tight">Fazer login</h1>
        <p class="text-muted-foreground text-sm">Digite seu e-mail e sua senha</p>
    </div>
    <div class="grid gap-6">
        <form [formGroup]="formUser" (ngSubmit)="onSubmit()">
            <label hlmLabel class="sr-only" for="email">E-mail</label>
            <input
                hlmInput
                class="w-full"
                placeholder="E-mail"
                type="email"
                id="email"
                formControlName="email"
                autocomplete="off"
            />

        <label hlmLabel class="sr-only" for="pass">Senha</label>
        <input
            hlmInput
            class="w-full mt-2"
            placeholder="Senha"
            type="password"
            id="pass"
            formControlName="password"
            autocomplete="off"
        />

        @if (isError()) {
            <p class="text-muted-foreground text-sm text-red-600 mt-2">Credenciais inválidas. Verifique seu usuário e sua senha.</p>
        }

        <button hlmBtn [disabled]="formUser.invalid" class="mt-2 w-full" type="submit">
            @if (isLoading()) {
                <hlm-icon name="lucideLoaderCircle" size="sm" class="mr-2 animate-spin" />
            }
            Login
        </button>
        
    </form>
    </div>
    <p class="text-muted-foreground text-center text-sm sm:px-8">
        Ao clicar em logar, você está aceitando os
        <a class="hover:text-primary cursor-pointer underline underline-offset-4">Termos de Uso</a>
        e
        <a class="hover:text-primary cursor-pointer underline underline-offset-4">Políticas de Privacidade</a>
        .
    </p>
</div>
        </div>
    </div>
</div>
