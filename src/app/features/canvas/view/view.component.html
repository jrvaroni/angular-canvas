<!-- src/app/features/canvas/view/view.component.html -->
<div class="canvas-page">
  <!-- Main toolbar - fixing the binding issues -->
  <app-canvas-toolbar
    [currentZoom]="zoomLevel"
    (zoomChange)="setZoom($event)"
    (undoAction)="undo()"
    (redoAction)="redo()"
    (clearAction)="clearCanvas()"
    (exportAction)="exportCanvas()">
  </app-canvas-toolbar>
  
  <div class="canvas-workspace">
    <!-- Sidebar for layers -->
    <app-canvas-sidebar></app-canvas-sidebar>
    <!-- Canvas container - fixing the toolService access -->
    <div 
      #canvasContainer
      class="canvas-container"
      (click)="handleCanvasClick($event)"
      >
      
      <canvas
        #canvas
        class="canvas"
        [width]="canvasWidth"
        [height]="canvasHeight">
      </canvas>
      
      <!-- Context menu -->
      <app-context-menu
        #contextMenu
        *ngIf="showContextMenu"
        [x]="contextMenuX"
        [y]="contextMenuY"
        (closed)="onContextMenuClosed()">
      </app-context-menu>
    </div>
  </div>
</div>
