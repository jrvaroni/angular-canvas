<div class="h-full px-4 py-6 lg:px-8 w-full">
  <header class="flex flex-col-reverse justify-between gap-y-10 align-baseline sm:flex-row">
    <div class="space-y-2">
      <h2 class="text-2xl font-semibold tracking-tight">Produtos</h2>
      <p class="text-muted-foreground text-sm">
        {{ id ? 'Atualizar produto' : 'Cadastre um novo produto' }}
      </p>
    </div>
    <!-- <a [routerLink]="['/tickets']" hlmBtn class="h-10 w-full sm:w-auto">
        <hlm-icon size="sm" class="mr-2" name="lucideCirclePlus" />
        Cadastrar
    </a> -->
  </header>

  <div class="w-full space-y-6">
    <brn-separator hlmSeparator />
    <div class="mx-auto w-full md:w-1/2">
      <form [formGroup]="form" class="flex flex-col items-end py-2 gap-5">
        <label hlmLabel class="w-full">
          Nome
          <input
            class="mt-2 w-full"
            placeholder="Nome e sobrenome"
            hlmInput
            autocomplete="off"
            formControlName="name"
          />
        </label>
  
        <label hlmLabel class="w-full">
          CPF/CNPJ
          <input
            class="mt-2 w-full"
            placeholder="CPF ou CNPJ"
            hlmInput
            mask="000.000.000-00||00.000.000/0000-00"
            autocomplete="off"
            formControlName="document"
          />
        </label>

        <label hlmLabel class="w-full">
          Telefone
          <input
            class="mt-2 w-full"
            placeholder="(00) 00000-0000"
            hlmInput
            mask="(00) 0000-0000||(00) 00000-0000"
            autocomplete="off"
            formControlName="tel"
            numbersOnly
          />
        </label>

        <label hlmLabel class="w-full">
          Endereço
          <input
            class="mt-2 w-full"
            placeholder="Rua: João, N° 00, Bairro - Cidade / UF"
            hlmInput
            autocomplete="off"
            formControlName="address"
          />
        </label>

        <label hlmLabel class="w-full">
          Anotações
          <textarea class="min-h-[80px] w-full" formControlName="anotation" hlmInput placeholder="Digite alguma observação sobre o cliente"></textarea>
        </label>
  
        <div class="flex justify-between w-full">
          <button hlmBtn type="button" variant='ghost' [routerLink]="['/produtos']">
            <span>Voltar</span>
          </button>
        @if(id) {
          <button hlmBtn [disabled]="form.invalid || !formHasChanged" variant="secondary" (click)="handlerUpdate()">
            <span>Atualizar</span>
          </button>
        } @else {
          <button hlmBtn [disabled]="form.invalid" variant="secondary" (click)="handlerRegister()">
            <span>Cadastrar</span>
          </button>
        }
        </div>
      </form>
    </div>
  </div>
</div>
